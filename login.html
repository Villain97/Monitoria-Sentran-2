<!doctype html><html lang="pt-br"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login — Monitoria Sentran</title><link rel="stylesheet" href="styles.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"><body class="login-page"><main class="login-card"><img src="sentran.png" class="login-logo" alt="Sentran"><h1 class="login-title">Acesso</h1><p class="login-sub">Entre como editor ou visualização.</p><form id="loginForm"><div class="login-field"><label for="user">Usuário</label><input id="user" autocomplete="username" placeholder="Usuário" required></div><div class="login-field"><label for="pass">Senha</label><input id="pass" type="password" autocomplete="current-password" placeholder="Senha" required></div><button class="login-btn" type="submit">Entrar</button><p class="login-error" id="loginError">Usuário ou senha inválidos.</p></form></main><script>const USERS={admin:{senha:'Sentran12',role:'editor',nome:'Administrador'},visitante:{senha:'Sentran12',role:'viewer',nome:'Visitante'}};document.getElementById('loginForm').addEventListener('submit',function(e){e.preventDefault();const u=document.getElementById('user').value.trim().toLowerCase();const p=document.getElementById('pass').value;const found=USERS[u];if(found&&found.senha===p){localStorage.setItem('sentran-auth-role',found.role);localStorage.setItem('sentran-auth-user',found.nome);location.href='index.html'}else{document.getElementById('loginError').style.display='block'}});</script></body></html>
