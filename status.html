<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Status — Monitoria Sentran</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap">
  <meta name="theme-color" content="#080808">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
<script src="main.js"></script>
<script src="status-data.js"></script>
<script>
(function(){
  'use strict';

  var main = document.getElementById('main-content');
  var dados = [];
  var filtroStatus = '';
  var filtroContrato = '';
  var busca = '';

  function esc(v){
    return String(v == null ? '' : v)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function normalizarStatus(v){
    v = String(v || '').toLowerCase().trim();
    if(v.includes('on') || v === 'online') return 'online';
    if(v.includes('off') || v === 'offline') return 'offline';
    return 'sem_dados';
  }

  function listaContratos(){
    var map = {};
    dados.forEach(function(item){ if(item.contrato) map[item.contrato] = true; });
    return Object.keys(map).sort(function(a,b){ return a.localeCompare(b,'pt-BR'); });
  }

  function contar(st){
    return dados.filter(function(item){ return normalizarStatus(item.status) === st; }).length;
  }

  function renderBase(){
    main.innerHTML = ''+
      '<h1 class="titulo">Status dos Equipamentos</h1>'+
      '<div class="status-summary-grid status-summary-grid--compact">'+
        '<div class="status-summary-card"><span>Total</span><strong id="statusTotal">0</strong></div>'+
        '<div class="status-summary-card status-card-online"><span>Online</span><strong id="statusOnline">0</strong></div>'+
        '<div class="status-summary-card status-card-offline"><span>Offline</span><strong id="statusOffline">0</strong></div>'+
        '<div class="status-summary-card status-card-unknown"><span>Sem dados</span><strong id="statusSemDados">0</strong></div>'+
      '</div>'+
      '<div class="status-controls status-controls--simple">'+
        '<input type="search" id="statusSearch" class="table-search" placeholder="🔍 Buscar série ou contrato...">'+
        '<select id="statusContrato" class="occ-input"><option value="">Todos os contratos</option></select>'+
        '<div class="func-filters status-filter-row">'+
          '<button class="func-btn active" data-status="">Todos</button>'+
          '<button class="func-btn" data-status="online">Online</button>'+
          '<button class="func-btn" data-status="offline">Offline</button>'+
          '<button class="func-btn" data-status="sem_dados">Sem dados</button>'+
        '</div>'+
      '</div>'+
      '<p class="table-counter" id="statusCounter"></p>'+
      '<div class="status-series-grid" id="statusBody"></div>';

    var select = document.getElementById('statusContrato');
    listaContratos().forEach(function(nome){
      var opt = document.createElement('option');
      opt.value = nome;
      opt.textContent = nome;
      select.appendChild(opt);
    });

    document.getElementById('statusSearch').addEventListener('input', function(e){ busca = e.target.value.toLowerCase().trim(); renderTabela(); });
    select.addEventListener('change', function(e){ filtroContrato = e.target.value; renderTabela(); });
    document.querySelector('.status-filter-row').addEventListener('click', function(e){
      var btn = e.target.closest('.func-btn');
      if(!btn) return;
      document.querySelectorAll('.status-filter-row .func-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      filtroStatus = btn.dataset.status || '';
      renderTabela();
    });
    renderTabela();
  }

  function renderTabela(){
    var body = document.getElementById('statusBody');
    var filtrados = dados.filter(function(item){
      var st = normalizarStatus(item.status);
      var texto = [item.contrato,item.serie].join(' ').toLowerCase();
      return (!filtroStatus || st === filtroStatus) &&
             (!filtroContrato || item.contrato === filtroContrato) &&
             (!busca || texto.indexOf(busca) !== -1);
    });

    filtrados.sort(function(a,b){
      return String(a.contrato || '').localeCompare(String(b.contrato || ''),'pt-BR') ||
             String(a.serie || '').localeCompare(String(b.serie || ''),'pt-BR');
    });

    body.innerHTML = filtrados.map(function(item){
      var st = normalizarStatus(item.status);
      var label = st === 'online' ? 'Online' : (st === 'offline' ? 'Offline' : 'Sem dados');
      var icon = st === 'online' ? '●' : (st === 'offline' ? '●' : '○');
      return '<article class="status-series-card status-series-'+st+'" title="'+esc(item.contrato || '')+'">'+
        '<span class="status-dot" aria-hidden="true">'+icon+'</span>'+
        '<strong>'+esc(item.serie || '—')+'</strong>'+
        '<small>'+esc(label)+'</small>'+
      '</article>';
    }).join('') || '<p class="status-empty">Nenhum equipamento encontrado.</p>';

    document.getElementById('statusCounter').textContent = filtrados.length+' de '+dados.length+' equipamentos';
    document.getElementById('statusTotal').textContent = dados.length;
    document.getElementById('statusOnline').textContent = contar('online');
    document.getElementById('statusOffline').textContent = contar('offline');
    document.getElementById('statusSemDados').textContent = contar('sem_dados');
  }

  function carregar(){
    function usar(payload){
      dados = (payload && payload.equipamentos) ? payload.equipamentos : [];
      renderBase();
    }

    fetch('status_equipamentos.json', {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('status'); return r.json(); })
      .then(usar)
      .catch(function(){
        if(window.SENTRAN_STATUS_EQUIPAMENTOS){
          usar(window.SENTRAN_STATUS_EQUIPAMENTOS);
          return;
        }
        main.innerHTML = '<h1 class="titulo">Status dos Equipamentos</h1><p class="status-empty">Não foi possível carregar o status dos equipamentos.</p>';
      });
  }

  if(main) carregar();
})();
</script>
</body>
</html>
